name: PHP SeedWork Docs

# Before the first deploy:
#   1. Create the gh-pages branch (or let mike create it on first run).
#   2. Enable GitHub Pages in Settings → Pages → Source: Deploy from branch gh-pages.

on:
  push:
    tags:
    - 'v*'
    branches:
    - main
    paths:
    - 'docs/**'
    - 'mkdocs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: Version to deploy without leading v (e.g. 0.8.0)
        required: true
        type: string

permissions: {}

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        else
          echo "value=$(python -m semantic_release version --print-last-released)" >> "$GITHUB_OUTPUT"
        fi

    - name: Deploy docs
      run: mike deploy --push --update-aliases ${{ steps.version.outputs.value }} latest
